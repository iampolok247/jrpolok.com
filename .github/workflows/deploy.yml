name: Deploy to cPanel (jrpolok.com)

on:
  push:
    branches:
      - main  # main branch-এ push হলেই auto deploy হবে
  workflow_dispatch: # চাইলে Actions tab থেকে manual deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    name: Build React App & Deploy via FTP

    steps:
      # ১. Code checkout
      - name: Checkout Repository
        uses: actions/checkout@v5

      # ২. Node.js setup
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: reeni/package-lock.json

      # ৩. Dependencies install
      - name: Install Dependencies
        working-directory: reeni
        run: npm ci

      # ৪. Production build
      - name: Build Project
        working-directory: reeni
        run: npm run build
        env:
          # EmailJS environment variables (GitHub Secrets থেকে আসবে)
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

      # ৫. Install SSH tools
      - name: Install SSH Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      # ৬. Add server to known_hosts
      - name: Setup Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.FTP_SERVER }} >> ~/.ssh/known_hosts

      # ৭. shared hosting-friendly deploy via SSH + SCP
      - name: Deploy via SCP over SSH
        run: |
          # FTP_SERVER_DIR must already exist and be writable (e.g. ~/jrpolok.com/)
          sshpass -p "${{ secrets.FTP_PASSWORD }}" scp -P 22 -o StrictHostKeyChecking=no -r reeni/dist/* ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:${{ secrets.FTP_SERVER_DIR }}
