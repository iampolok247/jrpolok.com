name: Deploy to cPanel (jrpolok.com)

on:
  push:
    branches:
      - main  # main branch-এ push হলেই auto deploy হবে
  workflow_dispatch: # চাইলে Actions tab থেকে manual deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    name: Build React App & Deploy via FTP

    steps:
      # ১. Code checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. Node.js setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: reeni/package-lock.json

      # ৩. Dependencies install
      - name: Install Dependencies
        working-directory: reeni
        run: npm ci

      # ৪. Production build
      - name: Build Project
        working-directory: reeni
        run: npm run build
        env:
          # EmailJS environment variables (GitHub Secrets থেকে আসবে)
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

      # ৫. SFTP Deploy → cPanel via SSH (port 22)
      - name: Deploy to cPanel via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: reeni/dist/*
          remote_path: ${{ secrets.FTP_SERVER_DIR }}
          sftp_only: true
          delete_remote_files: false
            **/node_modules/**
