name: Deploy to cPanel (jrpolok.com)

on:
  push:
    branches:
      - main  # main branch-এ push হলেই auto deploy হবে
  workflow_dispatch: # চাইলে Actions tab থেকে manual deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    name: Build React App & Deploy via FTP

    steps:
      # ১. Code checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. Node.js setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: reeni/package-lock.json

      # ৩. Dependencies install
      - name: Install Dependencies
        working-directory: reeni
        run: npm ci

      # ৪. Production build
      - name: Build Project
        working-directory: reeni
        run: npm run build
        env:
          # EmailJS environment variables (GitHub Secrets থেকে আসবে)
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

      # ৫. SSH key setup
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.FTP_SERVER }} >> ~/.ssh/known_hosts

      # ৬. rsync দিয়ে deploy → cPanel
      - name: Deploy via rsync over SSH
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -p 22 -o StrictHostKeyChecking=no" \
            reeni/dist/ \
            ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:${{ secrets.FTP_SERVER_DIR }}
